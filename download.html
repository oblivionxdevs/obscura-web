<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscura | Secure Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Progress Bar Animation */
        .progress-fill {
            width: 0%;
            transition: width 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        .card-bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            animation: pulse-glow 6s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        .hidden-state { display: none !important; }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex items-center justify-center p-6">

    <div class="card-bg-glow"></div>

    <div id="mainCard" class="max-w-xl w-full glass p-10 md:p-16 rounded-[4rem] relative z-10 text-center animate__animated animate__fadeInUp">
        <div class="w-24 h-24 bg-gradient-to-br from-violet-600 to-fuchsia-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-10 shadow-2xl animate__animated animate__bounceIn">
            <i data-lucide="download" class="text-white w-10 h-10"></i>
        </div>

        <h1 class="text-4xl font-extrabold mb-4 tracking-tighter">Obscura V2.0.4</h1>
        <p class="text-zinc-500 mb-10 text-lg leading-relaxed">
            Your secure download is ready. Click below to begin the extraction process.
        </p>

        <button onclick="startDownloadSequence()" class="block w-full bg-white text-black py-6 rounded-3xl font-black text-2xl hover:bg-zinc-100 transition-all hover:scale-[1.02] active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.1)]">
            INITIALIZE DOWNLOAD
        </button>

        <div class="mt-8 p-6 rounded-[2rem] bg-amber-500/10 border border-amber-500/20 flex items-start gap-4 text-left">
            <i data-lucide="alert-circle" class="text-amber-500 w-6 h-6 shrink-0 mt-1"></i>
            <p class="text-[11px] leading-relaxed text-amber-200/70 font-bold uppercase tracking-widest">
                Important: Disable antivirus real-time protection before running the installer to prevent false-positives.
            </p>
        </div>
    </div>

    <div id="loadingCard" class="hidden-state max-w-xl w-full glass p-12 rounded-[4rem] relative z-10 text-center animate__animated animate__fadeIn">
        <div class="flex flex-col items-center">
            <div class="animate-spin mb-8">
                <i data-lucide="loader-2" class="text-violet-500 w-12 h-12"></i>
            </div>
            
            <h2 class="text-2xl font-bold mb-2">Decrypting File...</h2>
            <p id="statusText" class="text-zinc-500 text-sm mb-10 uppercase tracking-[0.2em] font-bold italic">Contacting Server</p>

            <div class="w-full h-4 bg-zinc-900 rounded-full overflow-hidden border border-white/5 mb-6">
                <div id="progressBar" class="progress-fill h-full bg-gradient-to-r from-violet-600 to-fuchsia-500 shadow-[0_0_15px_rgba(124,58,237,0.5)]"></div>
            </div>

            <div class="flex justify-between w-full text-[10px] text-zinc-600 font-black uppercase tracking-widest">
                <span>SECURE-TUNNEL: ACTIVE</span>
                <span id="percentText">0%</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function startDownloadSequence() {
            const mainCard = document.getElementById('mainCard');
            const loadingCard = document.getElementById('loadingCard');
            const progressBar = document.getElementById('progressBar');
            const percentText = document.getElementById('percentText');
            const statusText = document.getElementById('statusText');

            // Swap cards
            mainCard.classList.add('animate__fadeOutDown');
            setTimeout(() => {
                mainCard.classList.add('hidden-state');
                loadingCard.classList.remove('hidden-state');
                
                // Start Progress Logic
                simulateProgress();
            }, 500);

            function simulateProgress() {
                let progress = 0;
                const statuses = ["Bypassing Firewall", "Authenticating Build", "Injecting Assets", "Finalizing .ZIP"];
                
                const interval = setInterval(() => {
                    progress += Math.floor(Math.random() * 15) + 5;
                    
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        finishDownload();
                    }

                    progressBar.style.width = progress + '%';
                    percentText.innerText = progress + '%';
                    
                    // Change status text based on progress
                    if (progress > 20) statusText.innerText = statuses[0];
                    if (progress > 50) statusText.innerText = statuses[1];
                    if (progress > 75) statusText.innerText = statuses[2];
                    if (progress > 90) statusText.innerText = statuses[3];

                }, 400);
            }

            function finishDownload() {
                statusText.innerText = "TRANSFER COMPLETE";
                statusText.classList.add('text-emerald-500');
                
                // Trigger the actual raw file download
                const downloadUrl = "https://cold-na-phx-2.gofile.io/download/web/6406c1bc-61c0-4847-bd0a-99770c9853fa/Obscura.zip";
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.setAttribute('download', 'Obscura.zip');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                setTimeout(() => {
                    alert("Download started! Check your browser's download folder.");
                }, 1000);
            }
        }
    </script>
</body>
</html>
